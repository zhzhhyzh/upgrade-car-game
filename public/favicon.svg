<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Car body -->
  <rect x="3" y="14" width="26" height="8" rx="2" fill="#1a1a2e"/>
  <!-- Cabin -->
  <path d="M9 14 L12 8 L20 8 L23 14" fill="#2a2a4e"/>
  <!-- Windshield -->
  <path d="M12.5 8.5 L14 9 L18 9 L19.5 8.5" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.8"/>
  <!-- Wheels -->
  <circle cx="9" cy="22" r="3.5" fill="#111"/>
  <circle cx="9" cy="22" r="1.8" fill="#333"/>
  <circle cx="23" cy="22" r="3.5" fill="#111"/>
  <circle cx="23" cy="22" r="1.8" fill="#333"/>
  <!-- Neon underglow -->
  <rect x="5" y="21.5" width="22" height="1" rx="0.5" fill="#00ffff" opacity="0.7"/>
  <!-- Headlight -->
  <circle cx="28" cy="17" r="1.2" fill="#ffffaa" opacity="0.9"/>
  <!-- Taillight -->
  <circle cx="4" cy="17" r="1" fill="#ff3333" opacity="0.9"/>
  <!-- Neon side stripe -->
  <line x1="5" y1="18" x2="27" y2="18" stroke="#00ffff" stroke-width="0.5" opacity="0.5"/>
</svg>
